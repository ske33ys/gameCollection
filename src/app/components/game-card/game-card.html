<div (click)="display == 'none' ? display = 'block' : display = 'none'">
  <h2>{{title()}}</h2>
  <section id="info" [style.display]="display">
    <p>Category: {{category()}}</p>
    <p>Players: {{minPlayers()}} @if(maxPlayers() > minPlayers()) { - {{maxPlayers()}} }</p>
    <p>Elements count: {{elements()}}</p>
  </section>
</div>
